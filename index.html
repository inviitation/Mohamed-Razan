<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed & Razan</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;600&family=El+Messiri:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay"></div>

<div class="intro" id="intro">
  <h2>💍 Engagement Invitation</h2>
  <p>Tap to Enter</p>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🔊</button>
<button id="langBtn">EN</button>

<div class="main" id="main">

  <div class="section">
    <h2 data-en="Engagement Invitation" data-ar="دعوة خطوبة">
      Engagement Invitation
    </h2>

    <p
      data-en="With hearts full of love and joy,<br>we invite you to celebrate our engagement"
      data-ar="بقلوبٍ يملؤها الحب والفرح،<br>ندعوكم لمشاركتنا هذه المناسبة السعيدة">

      With hearts full of love and joy,<br>
      we invite you to celebrate our engagement

    </p>
  </div>

  <div class="section">
    <h1 data-en="Mohamed <span>&</span> Razan"
        data-ar="محمد <span>&</span> رزان">

      Mohamed <span>&</span> Razan

    </h1>
  </div>

  <div class="section">

    <p data-en="Monday"
       data-ar="الاثنين">

       Monday

    </p>

    <h2 data-en="August 3, 2026"
        data-ar="3 أغسطس 2026">

        August 3, 2026

    </h2>

    <p data-en="05:00 PM"
       data-ar="05:00 مساءً">

       05:00 PM

    </p>

  </div>

  <div class="section">

    <p
      data-en="Red Castle Farm"
      data-ar="ريد كاسل فارم">

      Red Castle Farm

    </p>

  </div>

  <div class="section countdown">
    <div><span id="days">0</span><p>Days</p></div>
    <div><span id="hours">0</span><p>Hours</p></div>
    <div><span id="minutes">0</span><p>Minutes</p></div>
    <div><span id="seconds">0</span><p>Seconds</p></div>
  </div>

  <div class="section">
    <a href="https://maps.app.goo.gl/wkZGGwor4dRMPa4e6?g_st=ic"
       target="_blank"
       class="map-btn"
       data-en="📍 Get Directions"
       data-ar="📍 عرض الموقع">

       📍 Get Directions

    </a>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
